server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  servlet:
    encoding:
      charset: UTF-8

spring:
  profiles:
    include:
      - rdb
      - redis
      - domain
      - shared
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.debug: true
      mail.smtp.connectiontimeout: 1000
      mail.starttls.enable: true
      mail.smtp.auth: true

springdoc:
  api-docs:
    path: /openapi.json
  paths-to-match:
    - /api/**
  swagger-ui:
    enabled: false

app:
  response:
    # 이 호스트로 들어온 요청에만 응답 meta 커스텀을 적용한다. 비우면 비활성화.
    proxied-host: ${RESPONSE_PROXIED_HOST:api.kr-filter.com}
