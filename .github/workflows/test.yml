name: Test

permissions:
  contents: read

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staticCheck:
    name: Static check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run static check
        run: ./gradlew --no-daemon staticCheck

  unitTest:
    name: Unit test
    runs-on: ubuntu-latest
    needs: staticCheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew --no-daemon unitTest

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Unit test reports
          if-no-files-found: ignore
          path: |
            **/build/reports/tests/unitTest/
            **/build/test-results/unitTest/

  supportTest:
    name: Support test
    runs-on: ubuntu-latest
    needs: unitTest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run support tests
        run: ./gradlew --no-daemon supportTest

      - name: Upload support test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Support test reports
          if-no-files-found: ignore
          path: |
            profanity-test-support/build/reports/tests/test/
            profanity-test-support/build/test-results/test/

  apiE2eTest:
    name: Api e2e test
    runs-on: ubuntu-latest
    needs: supportTest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run api e2e tests
        run: ./gradlew --no-daemon apiE2eTest

      - name: Upload api e2e test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Api e2e test reports
          if-no-files-found: ignore
          path: |
            profanity-api/build/reports/tests/e2eTest/
            profanity-api/build/test-results/e2eTest/
