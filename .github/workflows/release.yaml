name: Release

on:
  release:
    types: [ published ]

run-name: Deploy ${{ github.event.release.tag_name }} to Production

permissions:
  contents: read
  deployments: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: deploy production
    runs-on: ubuntu-24.04-arm
    environment:
      name: Production
      url: https://api.kr-filter.com
    env:
      PUBLIC_URL: https://api.kr-filter.com
      HEALTH_URL: https://api.kr-filter.com/api/v1/health
      RELEASE_TARGET: Profanity Filter API
      REGISTRY_HOST: docker-registry.bottle-note.com
      IMAGE_NAME: profanity-api

    steps:
      - name: Validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY_HOST}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Ensure registry secrets are configured
        shell: bash
        env:
          ZOT_REGISTRY_USERNAME: ${{ secrets.ZOT_REGISTRY_USERNAME }}
          ZOT_REGISTRY_PASSWORD: ${{ secrets.ZOT_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$ZOT_REGISTRY_USERNAME" || -z "$ZOT_REGISTRY_PASSWORD" ]]; then
            echo "Production environment secrets ZOT_REGISTRY_USERNAME and ZOT_REGISTRY_PASSWORD are required." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.ZOT_REGISTRY_USERNAME }}
          password: ${{ secrets.ZOT_REGISTRY_PASSWORD }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.release.outputs.image }}

      - name: Check public health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 10 "$HEALTH_URL" > /dev/null

      - name: Write deployment summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Production deployment"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Name | Production |"
            echo "| Description | 운영 API 배포 환경 |"
            echo "| Public URL | $PUBLIC_URL |"
            echo "| Health URL | $HEALTH_URL |"
            echo "| Version | ${{ steps.release.outputs.tag }} |"
            echo "| Target | $RELEASE_TARGET |"
            echo "| Status | Active / Healthy |"
            echo "| Release | ${{ github.event.release.html_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
