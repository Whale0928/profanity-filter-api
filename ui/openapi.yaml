openapi: 3.1.0
info:
  title: 한국어 비속어 필터 API
  version: 0.0.1-SNAPSHOT
  summary: Aho-Corasick 기반 한국어 비속어 검출 및 마스킹 REST API
  description: |
    이 문서는 `/Users/hgkim/workspace/profanity-filter-api`의 현재 소스 코드 기준으로 작성한 OpenAPI 3.1 스펙입니다.

    ## 서비스 개요

    한국어 비속어 필터 API는 API Key 인증 후 문장 내 비속어를 빠르게 검출하거나 `*` 문자로 마스킹하는 REST API입니다.
    필터링 엔진은 `profanity-domain` 모듈의 `NormalProfanityFilter`에서 Aho-Corasick Trie를 사용하며,
    등록된 비속어 목록은 애플리케이션 기동 시와 동기화 시점에 저장소에서 읽어 Trie로 재구성됩니다.

    ## 인증 방식

    보호된 API는 `X-API-KEY` 헤더를 사용합니다. 헤더 이름은 HTTP 규칙상 대소문자를 구분하지 않으므로
    `x-api-key`도 동작합니다. 인증 제외 API는 클라이언트 등록, 이메일 인증, 헬스 체크, 정적 리소스입니다.

    ## 응답 표준

    이 프로젝트는 다수의 비즈니스 오류를 HTTP 상태 코드가 아닌 JSON 본문의 `status.code`로 표현합니다.
    README 기준으로 일반 API의 HTTP Status는 대부분 `200 OK`이며, 실제 성공/실패는 `status.code`를 확인해야 합니다.

    - `ApiResponse<T>`: 클라이언트·단어 관리 API에서 사용하는 envelope입니다.
    - `FilterApiResponse`: 비속어 필터링 API 전용 envelope입니다.
    - `status.code`: KISO 호환 목적의 애플리케이션 상태 코드입니다. 예: `2000`, `2020`, `4000`, `4010`, `4030`, `5000`.
    - `status.DetailDescription`: 코드상 필드명이 대문자 `D`를 포함합니다. JSON 응답도 `DetailDescription`으로 직렬화됩니다.
    - `meta`: `ApiResponse`에만 존재하며, 비어 있으면 생략됩니다. 설정된 프록시 호스트로 들어온 경우 `servedVia`가 포함될 수 있습니다.

    ## 주의할 현재 구현 상태

    - `POST /api/v1/filter`는 `application/json`과 `application/x-www-form-urlencoded`를 모두 받습니다.
      다만 비동기 처리는 JSON 요청에서 `callbackUrl`이 있을 때만 수행되고, form-urlencoded 컨트롤러는 항상 동기 처리합니다.
    - `POST /api/v1/clients/update`와 `POST /api/v1/clients/reissue`는 컨트롤러 로직상 현재 API Key를 읽지만,
      보안 설정에서는 `POST /api/v1/clients/**`가 permitAll로 등록되어 있습니다. 운영 클라이언트는 항상 `X-API-KEY`를 전달해야 합니다.
    - `POST /api/v1/word/accept/{requestId}`의 서비스 구현은 현재 `false`를 반환합니다.
    - `GET /api/v1/sync`는 `ResultMessage` enum을 직접 반환하므로 공통 `ApiResponse` envelope을 사용하지 않습니다.
    - `GET /api/v1/health`, `GET /api/v1/ping`은 plain text를 반환합니다.
servers:
  - url: https://api.profanity.kr-filter.com
    description: README에 명시된 운영 API 서버
  - url: http://localhost:8080
    description: 로컬 개발 서버
security:
  - ApiKeyAuth: []
tags:
  - name: Filter
    description: |
      비속어 검출과 마스킹을 수행하는 핵심 API 그룹입니다.
      `QUICK`, `NORMAL`, `FILTER` 세 가지 모드를 지원하며, JSON 요청에서는 `callbackUrl`을 전달해 비동기 콜백을 받을 수 있습니다.
      보호된 API이므로 `X-API-KEY` 헤더가 필요하고, 차단 또는 폐기된 클라이언트는 `status.code=4030` 응답을 받을 수 있습니다.
  - name: Clients
    description: |
      API Key를 사용하는 클라이언트 등록, 메타데이터 조회, 폐기, 정보 수정, 키 재발급, 이메일 인증을 담당합니다.
      등록과 이메일 인증 API는 인증 없이 호출할 수 있습니다. 메타데이터 조회와 폐기 API는 API Key 인증이 필요합니다.
  - name: Word Management
    description: |
      신규 비속어 등록, 제외, 수정 요청을 접수하는 그룹입니다.
      요청자는 인증된 클라이언트의 사용자 ID로 기록되며, 승인 API는 WRITE 권한을 검사하지만 현재 서비스 구현은 `false`를 반환합니다.
  - name: Sync
    description: |
      저장소의 비속어 단어 목록을 필터 Trie에 수동 동기화하는 관리자 성격의 API입니다.
      `password` query parameter를 요구하며, 공통 `ApiResponse` envelope이 아닌 `ResultMessage` enum 문자열을 직접 반환합니다.
  - name: Health
    description: |
      서비스 상태 확인용 공개 API입니다. 두 API 모두 인증 없이 호출되며 `text/plain` 형태의 짧은 문자열을 반환합니다.
paths:
  /api/v1/filter:
    post:
      tags:
        - Filter
      summary: 비속어 검증 요청
      operationId: requestProfanityFilter
      description: |
        입력 문장을 검증해 비속어 검출 결과와 선택적 마스킹 결과를 반환합니다.

        ## 요청 형식

        - `application/json`: 동기·비동기 요청을 모두 지원합니다.
        - `application/x-www-form-urlencoded`: 같은 필드를 form으로 전달할 수 있으나 현재 컨트롤러 구현은 항상 동기 처리합니다.

        ## 필터링 모드

        - `QUICK`: 첫 번째 매칭 단어만 반환합니다. `filtered`는 빈 문자열입니다.
        - `NORMAL`: 전체 매칭 단어를 반환합니다. `filtered`는 빈 문자열입니다.
        - `FILTER`: 전체 매칭 단어를 반환하고 원문에서 검출 위치를 `*`로 치환한 문자열을 `filtered`에 반환합니다.

        ## 비동기 처리

        JSON 요청에 `callbackUrl`이 있으면 서버는 즉시 `status.code=2020` 응답을 반환하고,
        백그라운드에서 필터링을 수행한 뒤 같은 `trackingId`를 포함한 `FilterApiResponse`를 `callbackUrl`로 POST합니다.
        콜백 실패 재시도는 현재 코드에 구현되어 있지 않습니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRequest"
            examples:
              quick:
                summary: 빠른 검출
                value:
                  text: 욕설을 사용하지 ㅅㅂ 마세요.
                  mode: QUICK
              normal:
                summary: 전체 검출
                value:
                  text: 욕설을 사용하지 ㅅㅂ 마세요.
                  mode: NORMAL
              filter:
                summary: 전체 검출 및 마스킹
                value:
                  text: 욕설을 사용하지 ㅅㅂ 마세요.
                  mode: FILTER
              async:
                summary: 비동기 콜백 요청
                value:
                  text: 욕설을 사용하지 ㅅㅂ 마세요.
                  mode: FILTER
                  callbackUrl: https://example.com/callback/profanity
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/FilterRequest"
            encoding:
              text:
                style: form
              mode:
                style: form
              callbackUrl:
                style: form
            example:
              text: 욕설을 사용하지 ㅅㅂ 마세요.
              mode: FILTER
      responses:
        "200":
          description: |
            필터링 요청 처리 결과입니다. 비즈니스 성공과 실패 모두 HTTP 200으로 내려올 수 있으므로 `status.code`를 확인해야 합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterApiResponse"
              examples:
                filtered:
                  summary: FILTER 모드 성공
                  value:
                    trackingId: 018f54f2-4c32-7f3a-8a90-6df40cf63e41
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    detected:
                      - length: 2
                        filteredWord: ㅅㅂ
                    filtered: 욕설을 사용하지 ** 마세요.
                    elapsed: 0.00007676 s / 0.07676 ms / 76.758 us
                asyncAccepted:
                  summary: 비동기 요청 접수
                  value:
                    trackingId: 018f54f2-4c32-7f3a-8a90-6df40cf63e41
                    status:
                      code: 2020
                      message: Accepted
                      description: 요청이 접수 되었습니다. 처리가 완료 시 결과를 받을 수 확인할 수 있습니다.
                      DetailDescription: ""
                    detected: []
                    filtered: ""
                    elapsed: 0.00000000 s / 0.00000 ms / 0.000 us
                validationError:
                  summary: 필수 필드 누락 또는 enum 오류
                  value:
                    status:
                      code: 4000
                      message: Bad_request
                      description: 처리에 실패하였습니다. 요청이 잘못 되었거나 필수 파라미터가 누락된 경우 발생 합니다. Description에서 보다 상세한 오류 메세지를 확인할 수 있습니다.
                      DetailDescription: "text: 필터링 대상 문자열은 필요합니다.  / "
                    data: null
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/filter/advanced:
    post:
      tags:
        - Filter
      summary: 단일 단어 고급 마스킹
      operationId: requestAdvancedProfanityFilter
      description: |
        `word` query parameter를 받아 `FILTER` 모드와 동일하게 검출 단어를 `*`로 치환합니다.
        요청 본문은 사용하지 않습니다. `word`가 누락되면 `MissingServletRequestParameterException`이 공통 오류 응답으로 변환됩니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
        - name: word
          in: query
          required: true
          description: 검증 및 마스킹할 단어 또는 문장입니다.
          schema:
            type: string
            minLength: 1
          example: 욕설을 사용하지 ㅅㅂ 마세요.
      responses:
        "200":
          description: 고급 마스킹 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterApiResponse"
              example:
                trackingId: 018f54f2-4c32-7f3a-8a90-6df40cf63e41
                status:
                  code: 2000
                  message: Ok
                  description: 정상적으로 처리 되었습니다.
                  DetailDescription: ""
                detected:
                  - length: 2
                    filteredWord: ㅅㅂ
                filtered: 욕설을 사용하지 ** 마세요.
                elapsed: 0.00007676 s / 0.07676 ms / 76.758 us
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/clients:
    get:
      tags:
        - Clients
      summary: 클라이언트 메타데이터 조회
      operationId: getClientMetadata
      description: |
        현재 `X-API-KEY`에 해당하는 클라이언트의 메타데이터를 조회합니다.
        API Key가 없으면 `status.code=4010`, 유효하지 않거나 저장소에 없으면 `4031` 또는 `4032` 계열 오류가 반환될 수 있습니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      responses:
        "200":
          description: 조회 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ClientMetadata"
                          - type: "null"
              examples:
                success:
                  summary: 클라이언트 메타데이터
                  value:
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    data:
                      id: 4e35ca95-1bdc-48dc-b38d-2db0307c24ad
                      email: bottlenote@email.com
                      issuerInfo: 도메인(https://bottle-note.com), 연락처(010-1234-5678)
                      note: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
                      permissions:
                        - READ
                        - WRITE
                      issuedAt: "2021-08-01T00:00:00"
                missingKey:
                  $ref: "#/components/examples/UnauthorizedBusiness"
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
    delete:
      tags:
        - Clients
      summary: 클라이언트 폐기
      operationId: discardClient
      description: |
        현재 API Key의 클라이언트를 폐기 상태로 변경합니다.
        구현상 권한 목록이 `DISCARD`로 바뀌고 만료 시간이 기록됩니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      responses:
        "200":
          description: 폐기 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type:
                          - boolean
                          - "null"
              example:
                status:
                  code: 2000
                  message: Ok
                  description: 정상적으로 처리 되었습니다.
                  DetailDescription: ""
                data: true
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/clients/register:
    post:
      tags:
        - Clients
      summary: 신규 클라이언트 등록
      operationId: registerClient
      description: |
        API 사용 클라이언트를 신규 등록하고 API Key를 발급합니다.
        인증 없이 호출할 수 있습니다. 이메일은 고유해야 하며, 중복 이메일은 비즈니스 오류로 처리됩니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRegisterRequest"
            example:
              name: 팀 보틀노트
              email: bottlenote@email.com
              issuerInfo: 도메인(https://bottle-note.com), 연락처(010-1234-5678)
              note: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
      responses:
        "200":
          description: 등록 성공 또는 validation 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ClientRegisterResponse"
                          - type: "null"
              examples:
                success:
                  summary: API Key 발급
                  value:
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    data:
                      name: 팀 보틀노트
                      email: bottlenote@email.com
                      apiKey: pf_live_1234567890abcdef
                      note: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
                duplicateEmail:
                  summary: 이메일 중복
                  value:
                    status:
                      code: 4000
                      message: Bad_request
                      description: 처리에 실패하였습니다. 요청이 잘못 되었거나 필수 파라미터가 누락된 경우 발생 합니다. Description에서 보다 상세한 오류 메세지를 확인할 수 있습니다.
                      DetailDescription: 이미 등록된 이메일입니다.
                    data: null
  /api/v1/clients/update:
    post:
      tags:
        - Clients
      summary: 클라이언트 정보 수정
      operationId: updateClient
      description: |
        현재 API Key에 해당하는 클라이언트의 발급자 정보와 메모를 수정합니다.
        현재 보안 설정에는 `POST /api/v1/clients/**`가 permitAll로 등록되어 있으나, 컨트롤러는 SecurityContext의 API Key를 사용하므로
        정상 사용 시 `X-API-KEY`를 반드시 전달해야 합니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateRequest"
            example:
              issuerInfo: 도메인(https://updated.example.com), 연락처(010-9999-9999)
              note: 업데이트된 메모입니다.
      responses:
        "200":
          description: 수정 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ClientMetadata"
                          - type: "null"
              example:
                status:
                  code: 2000
                  message: Ok
                  description: 정상적으로 처리 되었습니다.
                  DetailDescription: ""
                data:
                  id: 4e35ca95-1bdc-48dc-b38d-2db0307c24ad
                  email: bottlenote@email.com
                  issuerInfo: 도메인(https://updated.example.com), 연락처(010-9999-9999)
                  note: 업데이트된 메모입니다.
                  permissions:
                    - READ
                  issuedAt: "2021-08-01T00:00:00"
  /api/v1/clients/reissue:
    post:
      tags:
        - Clients
      summary: API Key 재발급
      operationId: reissueApiKey
      description: |
        현재 API Key를 새 API Key로 교체합니다.
        응답의 `data.newApiKey`가 이후 요청에 사용할 새 키입니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      responses:
        "200":
          description: 재발급 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ReissueApiKeyResponse"
                          - type: "null"
              example:
                status:
                  code: 2000
                  message: Ok
                  description: 정상적으로 처리 되었습니다.
                  DetailDescription: ""
                data:
                  newApiKey: pf_live_new_1234567890abcdef
  /api/v1/clients/send-email:
    get:
      tags:
        - Clients
      summary: 이메일 인증 코드 발송
      operationId: sendVerificationEmail
      description: |
        등록된 이메일 주소로 인증 코드를 발송합니다.
        이메일이 등록되어 있지 않으면 `status.code=4000`과 상세 메시지를 반환합니다.
      security: []
      parameters:
        - name: email
          in: query
          required: true
          description: 인증 코드를 받을 등록 이메일 주소입니다.
          schema:
            type: string
            format: email
          example: bottlenote@email.com
      responses:
        "200":
          description: 발송 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type:
                          - string
                          - "null"
              examples:
                success:
                  summary: 발송 성공
                  value:
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    data: send email
                emailNotFound:
                  summary: 등록되지 않은 이메일
                  value:
                    status:
                      code: 4000
                      message: Bad_request
                      description: 처리에 실패하였습니다. 요청이 잘못 되었거나 필수 파라미터가 누락된 경우 발생 합니다. Description에서 보다 상세한 오류 메세지를 확인할 수 있습니다.
                      DetailDescription: 해당 이메일로 가입된 사용자가 없습니다.
                    data: null
    put:
      tags:
        - Clients
      summary: 이메일 인증 코드 검증
      operationId: verifyEmailCode
      description: |
        이메일로 받은 인증 코드를 검증합니다.
        검증 성공 시 해당 이메일로 발급된 API Key를 반환합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailPayloadRequest"
            example:
              email: bottlenote@email.com
              code: "123456"
      responses:
        "200":
          description: 검증 성공 또는 비즈니스 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/VerifyEmailResponse"
                          - type: "null"
              examples:
                success:
                  summary: 인증 성공
                  value:
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    data:
                      apikey: pf_live_1234567890abcdef
                invalidCode:
                  summary: 인증 코드 불일치
                  value:
                    status:
                      code: 4000
                      message: Bad_request
                      description: 처리에 실패하였습니다. 요청이 잘못 되었거나 필수 파라미터가 누락된 경우 발생 합니다. Description에서 보다 상세한 오류 메세지를 확인할 수 있습니다.
                      DetailDescription: 이메일 인증 코드가 올바르지 않습니다.
                    data: null
  /api/v1/word/request:
    post:
      tags:
        - Word Management
      summary: 비속어 단어 변경 요청
      operationId: requestWordManagement
      description: |
        비속어 사전에 대한 등록, 제외, 수정 요청을 접수합니다.
        요청 타입은 외부 API에서는 `ADD`, `REMOVE`, `MODIFY`이며, 내부 저장 값은 각각 `NEW`, `EXCEPTION`, `MODIFY`입니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordRequest"
            examples:
              add:
                summary: 신규 등록 요청
                value:
                  word: 새로운 단어
                  reason: 이 단어는 욕설입니다.
                  severity: LOW
                  type: ADD
              remove:
                summary: 제외 요청
                value:
                  word: 예외 단어
                  reason: 정상 표현으로 오탐되어 제외가 필요합니다.
                  severity: LOW
                  type: REMOVE
              modify:
                summary: 수정 요청
                value:
                  word: 수정할 단어
                  reason: 등록 단어의 표기가 잘못되었습니다.
                  severity: MEDIUM
                  type: MODIFY
      responses:
        "200":
          description: 요청 접수 성공 또는 validation 오류
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/MessageResponse"
                          - type: "null"
              example:
                status:
                  code: 2000
                  message: Ok
                  description: 정상적으로 처리 되었습니다.
                  DetailDescription: ""
                data:
                  result: true
                  message: REQUEST_SUCCESS
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/word/accept/{requestId}:
    post:
      tags:
        - Word Management
      summary: 비속어 단어 요청 승인
      operationId: acceptWordManagementRequests
      description: |
        단어 변경 요청을 승인합니다. `WRITE` 권한이 없는 클라이언트는 `BusinessException`을 통해 오류 처리됩니다.
        현재 `DefaultWordManagementService.acceptWord` 구현은 실제 승인 처리 없이 항상 `false`를 반환합니다.

        `requestId`는 컨트롤러에서 `List<Long>`으로 받으므로 쉼표로 구분한 ID 목록을 전달할 수 있습니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
        - name: requestId
          in: path
          required: true
          description: 승인할 단어 요청 ID 목록입니다. 단건은 `1`, 다건은 `1,2,3` 형태로 전달합니다.
          schema:
            type: string
            pattern: "^[0-9]+(,[0-9]+)*$"
          example: "1,2,3"
      responses:
        "200":
          description: 승인 처리 결과
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type:
                          - boolean
                          - "null"
              examples:
                currentImplementation:
                  summary: 현재 구현 결과
                  value:
                    status:
                      code: 2000
                      message: Ok
                      description: 정상적으로 처리 되었습니다.
                      DetailDescription: ""
                    data: false
                noWritePermission:
                  summary: WRITE 권한 없음
                  value:
                    status:
                      code: 4000
                      message: Bad_request
                      description: 처리에 실패하였습니다. 요청이 잘못 되었거나 필수 파라미터가 누락된 경우 발생 합니다. Description에서 보다 상세한 오류 메세지를 확인할 수 있습니다.
                      DetailDescription: 권한이 없습니다.
                    data: null
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/sync:
    get:
      tags:
        - Sync
      summary: 비속어 사전 수동 동기화
      operationId: syncProfanityWords
      description: |
        저장소의 비속어 단어 목록을 필터 Trie에 수동 동기화합니다.
        공통 `ApiResponse` envelope을 사용하지 않고 `ResultMessage` enum 문자열을 직접 반환합니다.
        관리자용 `password` query parameter가 필요합니다.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyHeader"
        - name: password
          in: query
          required: true
          description: 수동 동기화를 허용하는 관리자 비밀번호입니다.
          schema:
            type: string
            format: password
            minLength: 1
      responses:
        "200":
          description: 동기화 결과 enum 문자열
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultMessage"
              examples:
                success:
                  summary: 성공
                  value: SUCCESS_SYNC_WORD
                failure:
                  summary: 실패
                  value: FAIL_SYNC_WORD
        "401":
          $ref: "#/components/responses/UnauthorizedTransport"
  /api/v1/health:
    get:
      tags:
        - Health
      summary: 헬스 체크
      operationId: health
      description: 인증 없이 호출 가능한 서비스 헬스 체크 API입니다.
      security: []
      responses:
        "200":
          description: 서비스 정상
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - OK
              example: OK
  /api/v1/ping:
    get:
      tags:
        - Health
      summary: 핑 체크
      operationId: ping
      description: 인증 없이 호출 가능한 간단한 ping API입니다.
      security: []
      responses:
        "200":
          description: 서비스 응답 가능
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - PONG
              example: PONG
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: |
        클라이언트 등록 후 발급받은 API Key입니다.
        보호된 API 호출 시 `X-API-KEY: {apiKey}` 헤더로 전달합니다.
  parameters:
    ApiKeyHeader:
      name: X-API-KEY
      in: header
      required: true
      description: 클라이언트 API Key입니다. 코드상 헤더 조회 이름은 `X-API-KEY`입니다.
      schema:
        type: string
        minLength: 1
      example: pf_live_1234567890abcdef
  responses:
    UnauthorizedTransport:
      description: |
        API Key 누락 또는 인증 실패입니다. 인증 엔트리포인트는 HTTP 401을 설정한 뒤 공통 오류 본문을 작성합니다.
        일부 컨트롤러 내부 오류는 HTTP 200 + `status.code=4010` 형태로도 표현될 수 있습니다.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiResponse"
              - type: object
                properties:
                  data:
                    type: "null"
          examples:
            missingKey:
              $ref: "#/components/examples/UnauthorizedBusiness"
            invalidKey:
              summary: 유효하지 않은 API Key
              value:
                status:
                  code: 4032
                  message: Invalid_api_key
                  description: API 키가 유효하지 않습니다. 인증 키가 유효하지 않거나 권한이 없는 경우 발생합니다.
                  DetailDescription: ""
                data: null
  examples:
    UnauthorizedBusiness:
      summary: API Key 누락
      value:
        status:
          code: 4010
          message: Unauthorized
          description: 인증 키가 누락 되었습니다.
          DetailDescription: ""
        data: null
  schemas:
    ApiResponse:
      type: object
      description: |
        클라이언트·단어 관리 API에서 사용하는 공통 응답 envelope입니다.
        성공과 실패 모두 이 구조를 사용하며, `status.code`로 애플리케이션 결과를 판단합니다.
        `meta`는 비어 있으면 JSON에서 생략됩니다.
      required:
        - status
        - data
      properties:
        status:
          $ref: "#/components/schemas/Status"
        data:
          description: 엔드포인트별 응답 데이터입니다. 오류 응답에서는 `null`입니다.
        meta:
          type: object
          description: |
            선택적 응답 메타데이터입니다. `app.response.proxied-host`와 요청 host가 일치하면 `servedVia`가 포함될 수 있습니다.
          additionalProperties: true
          properties:
            servedVia:
              type: string
              description: 응답 커스터마이저가 기록한 프록시 경유 host입니다.
              example: api.kr-filter.com
    FilterApiResponse:
      type: object
      description: |
        비속어 필터링 API 전용 응답 envelope입니다.
        `ApiResponse`와 달리 `data` 필드를 사용하지 않고 필터링 결과 필드를 최상위에 둡니다.
      required:
        - trackingId
        - status
        - detected
        - filtered
        - elapsed
      properties:
        trackingId:
          type: string
          format: uuid
          description: |
            요청 추적 ID입니다. 비동기 요청에서는 즉시 응답과 콜백 응답이 같은 `trackingId`를 사용합니다.
          example: 018f54f2-4c32-7f3a-8a90-6df40cf63e41
        status:
          $ref: "#/components/schemas/Status"
        detected:
          type: array
          uniqueItems: true
          description: |
            검출된 단어 목록입니다. 내부 구현은 `Set<Detected>`이므로 JSON 배열 순서는 보장되지 않습니다.
          items:
            $ref: "#/components/schemas/Detected"
        filtered:
          type: string
          description: |
            `FILTER` 또는 `/advanced` 요청에서 마스킹된 문자열입니다.
            `QUICK`, `NORMAL`, 비동기 접수 응답에서는 빈 문자열입니다.
          example: 욕설을 사용하지 ** 마세요.
        elapsed:
          type: string
          description: 처리 소요 시간 문자열입니다. `Elapsed.toString()` 결과입니다.
          example: 0.00007676 s / 0.07676 ms / 76.758 us
    Status:
      type: object
      description: |
        애플리케이션 상태 객체입니다. HTTP 상태와 별개로 API 처리 결과를 나타냅니다.
        `message`는 enum 이름을 기반으로 첫 글자만 대문자, 나머지는 소문자로 변환된 값입니다.
      required:
        - code
        - message
        - description
        - DetailDescription
      properties:
        code:
          $ref: "#/components/schemas/StatusCode"
        message:
          type: string
          description: 상태 코드 이름 기반 메시지입니다.
          examples:
            - Ok
            - Accepted
            - Bad_request
            - Unauthorized
            - Forbidden
            - Internal_server_error
        description:
          type: string
          description: 상태 코드의 기본 설명입니다.
          example: 정상적으로 처리 되었습니다.
        DetailDescription:
          type: string
          description: |
            검증 오류, 파라미터 오류 등 상세 설명입니다. 코드 필드명이 `DetailDescription`으로 정의되어 있습니다.
          example: "text: 필터링 대상 문자열은 필요합니다.  / "
    StatusCode:
      type: integer
      description: |
        애플리케이션 상태 코드입니다.

        | 코드 | enum | 의미 |
        |---:|---|---|
        | 2000 | OK | 정상 처리 |
        | 2020 | ACCEPTED | 비동기 요청 접수 |
        | 2021 | PROCESSING | 처리 진행 중 |
        | 4000 | BAD_REQUEST | 요청 형식, 필수 파라미터, validation 오류 |
        | 4001 | INVALID_CALLBACK_URL | 콜백 URL 형식 오류 |
        | 4002 | INVALID_TRACKING_ID | 유효하지 않은 Tracking ID |
        | 4003 | NOT_FOUNT_TRACKING_ID | Tracking ID를 찾을 수 없음 |
        | 4010 | UNAUTHORIZED | API Key 누락 |
        | 4030 | FORBIDDEN | 권한 부적절, 차단 또는 폐기 클라이언트 |
        | 4031 | NOT_FOUND_CLIENT | 클라이언트 정보 없음 |
        | 4032 | INVALID_API_KEY | API Key 형식 또는 값이 유효하지 않음 |
        | 4290 | TOO_MANY_REQUESTS | 요청 한도 초과 |
        | 5000 | INTERNAL_SERVER_ERROR | 서버 내부 오류 |
        | 5030 | SERVICE_UNAVAILABLE | 서비스 점검 또는 일시 불가 |
      enum:
        - 2000
        - 2020
        - 2021
        - 4000
        - 4001
        - 4002
        - 4003
        - 4010
        - 4030
        - 4031
        - 4032
        - 4290
        - 5000
        - 5030
      example: 2000
    Detected:
      type: object
      required:
        - length
        - filteredWord
      properties:
        length:
          type: integer
          format: int32
          minimum: 0
          description: 검출된 단어의 길이입니다.
          example: 2
        filteredWord:
          type: string
          description: 검출된 원문 단어입니다.
          example: ㅅㅂ
    FilterRequest:
      type: object
      required:
        - text
        - mode
      properties:
        text:
          type: string
          minLength: 1
          description: 검증할 원문 문자열입니다. blank 값은 validation 오류입니다.
          example: 욕설을 사용하지 ㅅㅂ 마세요.
        mode:
          $ref: "#/components/schemas/FilterMode"
        callbackUrl:
          type:
            - string
            - "null"
          description: |
            비동기 결과를 받을 콜백 URL입니다. JSON 요청에서 값이 있으면 비동기 요청으로 처리됩니다.
            코드상 정규식 validation이 적용되며 http, https, ftp 형식의 URL을 허용합니다.
          pattern: "((http[s]?|ftp):\\/\\/)?(?:www\\.)?[-a-zA-Z0-9@:%._\\+~#=가-힣]{1,256}[:|\\.][a-zA-Z0-9()]{1,6}\\b(?:[-a-zA-Z0-9()@:%_\\+,.~#?&\\/=가-힣]*)"
          example: https://example.com/callback/profanity
    FilterMode:
      type: string
      description: |
        필터링 모드입니다. `Mode.fromString`에 의해 대소문자 무시 파싱됩니다.
        알 수 없는 값은 `null`로 변환되고 `@NotNull` validation 오류가 발생합니다.
      enum:
        - QUICK
        - NORMAL
        - FILTER
      example: FILTER
    ClientRegisterRequest:
      type: object
      required:
        - name
        - email
        - issuerInfo
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
          description: 이름 또는 조직명입니다.
          example: 팀 보틀노트
        email:
          type: string
          format: email
          description: 클라이언트 이메일입니다. 저장소에서 unique 값입니다.
          example: bottlenote@email.com
        issuerInfo:
          type: string
          maxLength: 200
          description: 발급자 정보입니다. 도메인, 연락처, 담당자 등 API Key 발급 근거를 기록합니다.
          example: 도메인(https://bottle-note.com), 연락처(010-1234-5678)
        note:
          type:
            - string
            - "null"
          maxLength: 500
          description: 선택 메모입니다.
          example: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
    ClientRegisterResponse:
      type: object
      required:
        - name
        - email
        - apiKey
      properties:
        name:
          type: string
          example: 팀 보틀노트
        email:
          type: string
          format: email
          example: bottlenote@email.com
        apiKey:
          type: string
          description: 새로 발급된 API Key입니다. 이후 보호 API의 `X-API-KEY` 헤더에 사용합니다.
          example: pf_live_1234567890abcdef
        note:
          type:
            - string
            - "null"
          example: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
    ClientMetadata:
      type: object
      description: 현재 클라이언트의 메타데이터입니다.
      properties:
        id:
          type:
            - string
            - "null"
          format: uuid
          description: 클라이언트 고유 식별자입니다.
          example: 4e35ca95-1bdc-48dc-b38d-2db0307c24ad
        email:
          type:
            - string
            - "null"
          format: email
          description: 클라이언트 이메일입니다.
          example: bottlenote@email.com
        issuerInfo:
          type:
            - string
            - "null"
          description: 발급자 정보입니다.
          example: 도메인(https://bottle-note.com), 연락처(010-1234-5678)
        note:
          type:
            - string
            - "null"
          description: 클라이언트 메모입니다.
          example: 팀 프로젝트에서 피드 작성 시 비속어 검증을 위해 사용합니다.
        permissions:
          type:
            - array
            - "null"
          description: 클라이언트 권한 문자열 목록입니다.
          items:
            $ref: "#/components/schemas/Permission"
          example:
            - READ
            - WRITE
        issuedAt:
          type:
            - string
            - "null"
          description: 발급 일시입니다. 코드상 `LocalDateTime.toString()` 결과입니다.
          example: "2021-08-01T00:00:00"
    ClientUpdateRequest:
      type: object
      required:
        - issuerInfo
      properties:
        issuerInfo:
          type: string
          minLength: 1
          maxLength: 200
          description: 수정할 발급자 정보입니다.
          example: 도메인(https://updated.example.com), 연락처(010-9999-9999)
        note:
          type:
            - string
            - "null"
          maxLength: 500
          description: 수정할 메모입니다.
          example: 업데이트된 메모입니다.
    ReissueApiKeyResponse:
      type: object
      required:
        - newApiKey
      properties:
        newApiKey:
          type: string
          description: 재발급된 API Key입니다.
          example: pf_live_new_1234567890abcdef
    MailPayloadRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: 인증 대상 이메일입니다.
          example: bottlenote@email.com
        code:
          type: string
          minLength: 1
          description: 이메일로 전달된 인증 코드입니다.
          example: "123456"
    VerifyEmailResponse:
      type: object
      required:
        - apikey
      properties:
        apikey:
          type: string
          description: 인증된 이메일로 발급된 API Key입니다. 필드명은 현재 코드의 `apikey`를 따릅니다.
          example: pf_live_1234567890abcdef
    WordRequest:
      type: object
      required:
        - word
        - reason
        - severity
        - type
      properties:
        word:
          type: string
          minLength: 1
          description: 등록, 제외, 수정 요청할 단어입니다.
          example: 새로운 단어
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: 요청 사유입니다.
          example: 이 단어는 욕설입니다.
        severity:
          $ref: "#/components/schemas/WordSeverity"
        type:
          $ref: "#/components/schemas/WordRequestType"
    WordSeverity:
      type: string
      description: |
        요청 단어의 심각도입니다.
        - `LOW`: 낮은 수위
        - `MEDIUM`: 중간 수위
        - `HIGH`: 높은 수위
      enum:
        - LOW
        - MEDIUM
        - HIGH
      example: LOW
    WordRequestType:
      type: string
      description: |
        단어 관리 요청 타입입니다.
        - `ADD`: 신규 등록 요청
        - `REMOVE`: 제외 요청
        - `MODIFY`: 수정 요청
      enum:
        - ADD
        - REMOVE
        - MODIFY
      example: ADD
    MessageResponse:
      type: object
      required:
        - result
        - message
      properties:
        result:
          type: boolean
          description: 비즈니스 처리 결과입니다.
          example: true
        message:
          $ref: "#/components/schemas/BusinessMessageCode"
    BusinessMessageCode:
      type: string
      description: |
        `BusinessMessage` enum 값입니다. 현재 성공 메시지는 `SuccessBusinessMessage`, 실패 메시지는 `ErrorBusinessMessage`에 정의되어 있습니다.
      enum:
        - CREATE_SUCCESS
        - REQUEST_SUCCESS
        - UPDATE_SUCCESS
        - DELETE_SUCCESS
        - NOT_FOUND
        - INVALID_REQUEST
        - SERVER_ERROR
      example: REQUEST_SUCCESS
    Permission:
      type: string
      description: |
        클라이언트 권한입니다.
        - `READ`: 읽기
        - `WRITE`: 쓰기
        - `DELETE`: 삭제
        - `BLOCK`: 차단
        - `DISCARD`: 폐기
      enum:
        - READ
        - WRITE
        - DELETE
        - BLOCK
        - DISCARD
      example: READ
    ResultMessage:
      type: string
      description: |
        수동 동기화 API가 직접 반환하는 enum 문자열입니다.
        실제 enum 값은 `app.core.data.manage.response.ResultMessage`를 기준으로 합니다.
      enum:
        - SUCCESS_SYNC_WORD
        - FAIL_SYNC_WORD
      example: SUCCESS_SYNC_WORD
x-tagGroups:
  - name: 시작하기
    tags:
      - Filter
      - Clients
  - name: 문서/예제
    tags:
      - Word Management
  - name: 운영
    tags:
      - Sync
      - Health
