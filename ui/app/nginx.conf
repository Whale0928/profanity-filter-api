server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /docs {
    try_files /docs/index.html =404;
  }

  location = /docs/ {
    return 308 /docs;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 "OK\n";
  }
}
