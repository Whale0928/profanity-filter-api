server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /overview.md {
    default_type text/markdown;
    charset utf-8;
    try_files /overview.md =404;
  }

  location = /health {
    access_log off;
    return 200 "OK\n";
  }
}
